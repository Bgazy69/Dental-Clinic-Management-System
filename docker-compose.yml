services:
  redis:
    image: redis:7-alpine
    container_name: dental_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: dental_backend
    environment:
      DATABASE_URL: "postgresql://postgres:bigazy69@host.docker.internal:5432/dental_clinic"
      JWT_SECRET: dental_clinic_super_secret_key_2024
      REDIS_HOST: redis
      REDIS_URL: "redis://redis:6379"
      PORT: 5000
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      - redis
    command: sh -c "npx prisma migrate deploy && node src/app.js"

  frontend:
    build: ./frontend
    container_name: dental_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend