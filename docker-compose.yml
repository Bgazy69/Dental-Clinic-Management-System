version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: dental_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: dental_clinic
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: dental_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: dental_backend
    environment:
      DATABASE_URL: postgresql://postgres:password123@postgres:5432/dental_clinic
      JWT_SECRET: dental_clinic_super_secret_key_2024
      REDIS_HOST: redis
      REDIS_URL: redis://redis:6379
      PORT: 5000
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    command: sh -c "npx prisma migrate deploy && node src/app.js"

  frontend:
    build: ./frontend
    container_name: dental_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: